<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS 音色接口连通性测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }
    .config-panel {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .config-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }
    .config-row label {
      width: 80px;
      font-weight: 500;
    }
    .config-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    .config-row input:focus {
      outline: none;
      border-color: #3498db;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3498db;
      color: white;
    }
    .btn-primary:hover {
      background: #2980b9;
    }
    .btn-success {
      background: #27ae60;
      color: white;
    }
    .btn-success:hover {
      background: #219a52;
    }
    .btn-warning {
      background: #f39c12;
      color: white;
    }
    .btn-warning:hover {
      background: #d68910;
    }
    .btn-danger {
      background: #e74c3c;
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    button:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .status-panel {
      background: white;
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .status-dot.success { background: #27ae60; }
    .status-dot.error { background: #e74c3c; }
    .status-dot.pending { background: #f39c12; animation: pulse 1s infinite; }
    .status-dot.idle { background: #bdc3c7; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .result-panel {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .result-stats {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #666;
    }
    .result-stats span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .result-table th,
    .result-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .result-table th {
      background: #f8f9fa;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    .result-table tbody {
      display: block;
      max-height: 500px;
      overflow-y: auto;
    }
    .result-table thead,
    .result-table tbody tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }
    .result-table tr:hover {
      background: #f8f9fa;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 4px;
      background: #e8f4fd;
      color: #2980b9;
    }
    .gender-female { color: #e91e63; }
    .gender-male { color: #2196f3; }
    .provider-aliyun { background: #ff9800; color: white; }
    .provider-tencent { background: #00bcd4; color: white; }
    .provider-volcengine { background: #3f51b5; color: white; }
    .provider-minimax { background: #9c27b0; color: white; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .error-msg {
      background: #fee;
      color: #c00;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .success-msg {
      background: #efe;
      color: #060;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .filters select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    .api-list {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    .api-list h4 {
      margin-bottom: 10px;
    }
    .api-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
    }
    .api-item code {
      background: #f5f5f5;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    .api-item .status {
      margin-left: auto;
      font-size: 12px;
    }
    .api-item .status.ok { color: #27ae60; }
    .api-item .status.fail { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TTS 音色接口连通性测试</h1>

    <!-- 配置面板 -->
    <div class="config-panel">
      <div class="config-row">
        <label>服务器地址</label>
        <input type="text" id="baseUrl" value="http://localhost:3000" placeholder="http://your-server:3000">
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="testAll()">测试全部接口</button>
        <button class="btn-success" onclick="fetchModels()">获取音色列表</button>
        <button class="btn-warning" onclick="fetchProviders()">获取提供商</button>
        <button class="btn-warning" onclick="fetchTags()">获取标签</button>
        <button class="btn-danger" onclick="testHealth()">健康检查</button>
        <button onclick="clearResults()">清空结果</button>
      </div>
    </div>

    <!-- 状态面板 -->
    <div class="status-panel">
      <div class="status-item">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">等待测试...</span>
      </div>
      <div id="apiList" class="api-list" style="display: none;">
        <h4>接口状态</h4>
        <div id="apiItems"></div>
      </div>
    </div>

    <!-- 结果面板 -->
    <div class="result-panel">
      <div class="result-header">
        <h3>音色列表</h3>
        <div class="result-stats">
          <span>总数: <strong id="totalCount">0</strong></span>
          <span>筛选: <strong id="filteredCount">0</strong></span>
        </div>
      </div>
      <div class="filters">
        <select id="filterProvider" onchange="applyFilters()">
          <option value="">全部提供商</option>
        </select>
        <select id="filterGender" onchange="applyFilters()">
          <option value="">全部性别</option>
          <option value="female">女声</option>
          <option value="male">男声</option>
        </select>
        <input type="text" id="filterSearch" placeholder="搜索音色名称..." oninput="applyFilters()">
      </div>
      <div id="resultContent">
        <div class="loading">点击上方按钮开始测试</div>
      </div>
    </div>
  </div>

  <script>
    // 状态管理
    let allVoices = [];
    let apiStatus = {};

    // 更新状态指示
    function updateStatus(status, text) {
      const dot = document.getElementById('statusDot');
      const textEl = document.getElementById('statusText');
      dot.className = 'status-dot ' + status;
      textEl.textContent = text;
    }

    // 更新API状态列表
    function updateApiList() {
      const container = document.getElementById('apiList');
      const items = document.getElementById('apiItems');
      const entries = Object.entries(apiStatus);

      if (entries.length === 0) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'block';
      items.innerHTML = entries.map(([api, status]) => `
        <div class="api-item">
          <code>${api}</code>
          <span class="status ${status.ok ? 'ok' : 'fail'}">
            ${status.ok ? '✓ ' + status.time + 'ms' : '✗ ' + status.error}
          </span>
        </div>
      `).join('');
    }

    // 通用请求方法
    async function request(endpoint) {
      const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
      const url = baseUrl + endpoint;
      const start = Date.now();

      try {
        const response = await fetch(url, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });

        const time = Date.now() - start;
        const data = await response.json();

        apiStatus[endpoint] = { ok: response.ok, time, status: response.status };
        updateApiList();

        return { ok: true, data, time };
      } catch (error) {
        apiStatus[endpoint] = { ok: false, error: error.message };
        updateApiList();
        return { ok: false, error: error.message };
      }
    }

    // 测试健康检查
    async function testHealth() {
      updateStatus('pending', '正在检查服务健康状态...');
      const result = await request('/health');

      if (result.ok) {
        updateStatus('success', `服务正常 - ${result.time}ms`);
      } else {
        updateStatus('error', `服务异常: ${result.error}`);
      }
    }

    // 获取音色列表
    async function fetchModels() {
      updateStatus('pending', '正在获取音色列表...');
      const result = await request('/api/voice-models/models');

      if (result.ok && result.data.success) {
        allVoices = result.data.data || [];
        document.getElementById('totalCount').textContent = allVoices.length;
        updateProviderFilter();
        renderVoices(allVoices);
        updateStatus('success', `成功获取 ${allVoices.length} 个音色 - ${result.time}ms`);
      } else {
        updateStatus('error', `获取失败: ${result.error || result.data?.error}`);
      }
    }

    // 获取提供商列表
    async function fetchProviders() {
      updateStatus('pending', '正在获取提供商列表...');
      const result = await request('/api/voice-models/providers');

      if (result.ok && result.data.success) {
        const providers = result.data.data || [];
        const stats = result.data.stats || {};
        updateStatus('success', `${providers.length} 个提供商 - ${result.time}ms`);
        alert('提供商列表:\n' + providers.map(p => `${p}: ${stats[p]?.count || 0} 个音色`).join('\n'));
      } else {
        updateStatus('error', `获取失败: ${result.error || result.data?.error}`);
      }
    }

    // 获取标签列表
    async function fetchTags() {
      updateStatus('pending', '正在获取标签列表...');
      const result = await request('/api/voice-models/tags');

      if (result.ok && result.data.success) {
        const tags = result.data.data || [];
        const stats = result.data.stats || {};
        updateStatus('success', `${tags.length} 个标签 - ${result.time}ms`);
        alert('标签列表:\n' + tags.slice(0, 20).map(t => `${t}: ${stats[t]} 个`).join('\n'));
      } else {
        updateStatus('error', `获取失败: ${result.error || result.data?.error}`);
      }
    }

    // 测试全部接口
    async function testAll() {
      const endpoints = [
        '/health',
        '/api/voice-models/models',
        '/api/voice-models/providers',
        '/api/voice-models/tags',
        '/api/voice-models/categories',
        '/api/voice-models/stats'
      ];

      updateStatus('pending', `正在测试 ${endpoints.length} 个接口...`);

      for (const endpoint of endpoints) {
        await request(endpoint);
      }

      const success = Object.values(apiStatus).filter(s => s.ok).length;
      const total = Object.keys(apiStatus).length;
      updateStatus(success === total ? 'success' : 'error', `${success}/${total} 个接口正常`);
    }

    // 更新提供商筛选器
    function updateProviderFilter() {
      const providers = [...new Set(allVoices.map(v => v.provider))];
      const select = document.getElementById('filterProvider');
      select.innerHTML = '<option value="">全部提供商</option>' +
        providers.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    // 应用筛选
    function applyFilters() {
      const provider = document.getElementById('filterProvider').value;
      const gender = document.getElementById('filterGender').value;
      const search = document.getElementById('filterSearch').value.toLowerCase();

      let filtered = allVoices;

      if (provider) {
        filtered = filtered.filter(v => v.provider === provider);
      }
      if (gender) {
        filtered = filtered.filter(v => v.gender === gender);
      }
      if (search) {
        filtered = filtered.filter(v =>
          (v.name && v.name.toLowerCase().includes(search)) ||
          (v.id && v.id.toLowerCase().includes(search))
        );
      }

      renderVoices(filtered);
    }

    // 渲染音色表格
    function renderVoices(voices) {
      document.getElementById('filteredCount').textContent = voices.length;

      if (voices.length === 0) {
        document.getElementById('resultContent').innerHTML =
          '<div class="loading">没有匹配的音色</div>';
        return;
      }

      const rows = voices.slice(0, 200).map(v => `
        <tr>
          <td><code>${v.id || '-'}</code></td>
          <td>${v.name || '-'}</td>
          <td><span class="tag provider-${v.provider}">${v.provider || '-'}</span></td>
          <td>${v.service || '-'}</td>
          <td class="gender-${v.gender}">${v.gender === 'female' ? '女' : v.gender === 'male' ? '男' : '-'}</td>
          <td>${(v.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('') || '-'}</td>
        </tr>
      `).join('');

      document.getElementById('resultContent').innerHTML = `
        <table class="result-table">
          <thead>
            <tr>
              <th style="width:25%">ID</th>
              <th style="width:15%">名称</th>
              <th style="width:12%">提供商</th>
              <th style="width:15%">服务</th>
              <th style="width:8%">性别</th>
              <th style="width:25%">标签</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        ${voices.length > 200 ? '<div class="loading">仅显示前 200 条</div>' : ''}
      `;
    }

    // 清空结果
    function clearResults() {
      allVoices = [];
      apiStatus = {};
      document.getElementById('totalCount').textContent = '0';
      document.getElementById('filteredCount').textContent = '0';
      document.getElementById('resultContent').innerHTML =
        '<div class="loading">点击上方按钮开始测试</div>';
      document.getElementById('apiList').style.display = 'none';
      updateStatus('idle', '等待测试...');
    }

    // 初始化状态
    document.getElementById('statusDot').className = 'status-dot idle';
  </script>
</body>
</html>
