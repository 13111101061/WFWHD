<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS 前端调用演示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2 i {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .voice-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .voice-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .voice-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .voice-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .voice-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .voice-card p {
            color: #666;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .voice-card .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .audio-player {
            background: #f0f8ff;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .audio-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #f5f5f5;
        }

        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .stats {
            background: #e8f5e8;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 TTS 前端调用演示</h1>
            <p>完整的语音合成前端调用示例</p>
        </div>

        <div class="content">
            <!-- 统计信息 -->
            <div class="stats" id="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalModels">0</div>
                    <div class="stat-label">总模型数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="femaleModels">0</div>
                    <div class="stat-label">女声</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="maleModels">0</div>
                    <div class="stat-label">男声</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="status">🔴</div>
                    <div class="stat-label">服务状态</div>
                </div>
            </div>

            <!-- 功能标签页 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('synthesis')">语音合成</button>
                <button class="tab" onclick="switchTab('models')">模型选择</button>
                <button class="tab" onclick="switchTab('search')">搜索模型</button>
            </div>

            <!-- 语音合成页面 -->
            <div id="synthesis" class="tab-content active">
                <div class="section">
                    <h2><i class="fas fa-microphone"></i> 语音合成</h2>

                    <div class="form-group">
                        <label for="text">输入文本：</label>
                        <textarea id="text" placeholder="请输入要转换为语音的文本...">你好，欢迎使用TTS语音合成服务！这是一个演示页面。</textarea>
                    </div>

                    <div class="form-group">
                        <label for="service">TTS服务：</label>
                        <select id="service">
                            <option value="aliyun_qwen_http">阿里云 Qwen3 Flash</option>
                            <option value="moss_tts">MOSS TTS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="voice">声音选择：</label>
                        <select id="voice">
                            <option value="">请先选择TTS服务</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>参数设置：</label>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                            <div>
                                <label for="speed">语速 (0.5-2.0)：</label>
                                <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
                                <span id="speedValue">1.0</span>
                            </div>
                            <div>
                                <label for="pitch">音调 (0.5-1.5)：</label>
                                <input type="range" id="pitch" min="0.5" max="1.5" step="0.1" value="1.0">
                                <span id="pitchValue">1.0</span>
                            </div>
                            <div>
                                <label for="volume">音量 (0-10)：</label>
                                <input type="range" id="volume" min="0" max="10" step="0.5" value="5">
                                <span id="volumeValue">5</span>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button id="synthesizeBtn" onclick="synthesize()">
                            <i class="fas fa-play"></i> 合成语音
                        </button>
                        <button id="playBtn" onclick="playAudio()" disabled>
                            <i class="fas fa-volume-up"></i> 播放
                        </button>
                        <button id="downloadBtn" onclick="downloadAudio()" disabled>
                            <i class="fas fa-download"></i> 下载
                        </button>
                        <button id="clearBtn" onclick="clearAudio()">
                            <i class="fas fa-trash"></i> 清除
                        </button>
                    </div>

                    <!-- 音频播放器 -->
                    <div id="audioPlayer" class="audio-player" style="display: none;">
                        <h3>🎵 音频播放器</h3>
                        <audio id="audio" controls style="width: 100%; margin: 10px 0;"></audio>

                        <div class="progress-bar">
                            <div class="progress-bar-fill" id="progressFill"></div>
                        </div>

                        <div class="audio-controls">
                            <button onclick="togglePlay()">
                                <i class="fas fa-play" id="playPauseIcon"></i>
                            </button>
                            <button onclick="stopAudio()">
                                <i class="fas fa-stop"></i> 停止
                            </button>
                            <button onclick="muteAudio()">
                                <i class="fas fa-volume-mute" id="muteIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 状态显示 -->
                    <div id="status" class="status" style="display: none;"></div>
                </div>
            </div>

            <!-- 模型选择页面 -->
            <div id="models" class="tab-content">
                <div class="section">
                    <h2><i class="fas fa-users"></i> 模型选择</h2>

                    <div class="filter-bar">
                        <select id="categoryFilter" onchange="filterModels()">
                            <option value="">所有分类</option>
                            <option value="female">女声</option>
                            <option value="male">男声</option>
                            <option value="character">特色声音</option>
                        </select>

                        <select id="tagFilter" onchange="filterModels()">
                            <option value="">所有标签</option>
                            <option value="popular">热门</option>
                            <option value="sweet">甜美</option>
                            <option value="professional">专业</option>
                            <option value="english">英文</option>
                        </select>

                        <select id="languageFilter" onchange="filterModels()">
                            <option value="">所有语言</option>
                            <option value="zh-CN">中文</option>
                            <option value="en-US">美式英文</option>
                            <option value="en-GB">英式英文</option>
                        </select>

                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="搜索模型..." onkeyup="searchModels()">
                        </div>
                    </div>

                    <div class="voice-cards" id="voiceCards">
                        <!-- 动态生成的模型卡片 -->
                    </div>
                </div>
            </div>

            <!-- 搜索页面 -->
            <div id="search" class="tab-content">
                <div class="section">
                    <h2><i class="fas fa-search"></i> 搜索模型</h2>

                    <div class="form-group">
                        <label for="searchText">搜索关键词：</label>
                        <input type="text" id="searchText" placeholder="输入模型名称、标签或描述..." style="width: 100%;">
                    </div>

                    <div class="button-group">
                        <button onclick="searchModels()">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <button onclick="clearSearch()">
                            <i class="fas fa-times"></i> 清除
                        </button>
                    </div>

                    <div class="voice-cards" id="searchResults">
                        <!-- 搜索结果 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入TTS客户端库 -->
    <script src="js/tts-client.js"></script>

    <script>
        // 全局变量
        let ttsClient;
        let currentAudio = null;
        let currentAudioPlayer = null;
        let selectedModel = null;
        let allModels = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            ttsClient = new TTSClient();

            // 初始化界面
            await initializeUI();
            await loadModels();
            await checkServiceStatus();

            // 绑听参数变化
            document.getElementById('speed').addEventListener('input', updateSpeedDisplay);
            document.getElementById('pitch').addEventListener('input', updatePitchDisplay);
            document.getElementById('volume').addEventListener('input', updateVolumeDisplay);
            document.getElementById('service').addEventListener('change', updateVoiceOptions);
        });

        // 初始化UI
        async function initializeUI() {
            // 更新参数显示
            updateSpeedDisplay();
            updatePitchDisplay();
            updateVolumeDisplay();
        }

        // 更新语速显示
        function updateSpeedDisplay() {
            const speed = document.getElementById('speed').value;
            document.getElementById('speedValue').textContent = speed;
        }

        // 更新音调显示
        function updatePitchDisplay() {
            const pitch = document.getElementById('pitch').value;
            document.getElementById('pitchValue').textContent = pitch;
        }

        // 更新音量显示
        function updateVolumeDisplay() {
            const volume = document.getElementById('volume').value;
            document.getElementById('volumeValue').textContent = volume;
        }

        // 加载模型列表
        async function loadModels() {
            try {
                showStatus('正在加载模型...', 'info');
                allModels = await ttsClient.getModels();
                displayModels(allModels);
                updateStats();
                hideStatus();
                updateVoiceOptions();
            } catch (error) {
                showStatus(`加载模型失败: ${error.message}`, 'error');
            }
        }

        // 显示模型卡片
        function displayModels(models) {
            const container = document.getElementById('voiceCards');
            container.innerHTML = '';

            models.forEach(model => {
                const card = createModelCard(model);
                container.appendChild(card);
            });
        }

        // 创建模型卡片
        function createModelCard(model) {
            const card = document.createElement('div');
            card.className = 'voice-card';
            card.dataset.modelId = model.id;

            card.innerHTML = `
                <h3>${model.name}</h3>
                <p>${model.description || '暂无描述'}</p>
                <div class="tags">
                    ${model.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                <p><strong>提供商:</strong> ${model.provider}</p>
                <p><strong>语言:</strong> ${model.languages.join(', ')}</p>
                <p><strong>性别:</strong> ${model.gender}</p>
            `;

            card.addEventListener('click', () => selectModel(model));
            return card;
        }

        // 选择模型
        function selectModel(model) {
            // 移除其他选中状态
            document.querySelectorAll('.voice-card').forEach(card => {
                card.classList.remove('selected');
            });

            // 添加选中状态
            const card = document.querySelector(`[dataset-model-id="${model.id}"]`);
            if (card) {
                card.classList.add('selected');
            }

            selectedModel = model;
            showStatus(`已选择: ${model.name}`, 'success');

            // 如果在合成页面，更新voice选择
            if (document.getElementById('synthesis').classList.contains('active')) {
                const voiceSelect = document.getElementById('voice');
                const option = document.createElement('option');
                option.value = model.voiceId;
                option.textContent = model.name;
                option.selected = true;

                // 清空并添加选项
                voiceSelect.innerHTML = '';
                voiceSelect.appendChild(option);
            }
        }

        // 更新语音选项
        function updateVoiceOptions() {
            const service = document.getElementById('service').value;
            const voiceSelect = document.getElementById('voiceSelect');
            voiceSelect.innerHTML = '<option value="">请选择声音</option>';

            if (service && selectedModel) {
                const option = document.createElement('option');
                option.value = selectedModel.voiceId;
                option.textContent = selectedModel.name;
                option.selected = true;
                voiceSelect.appendChild(option);
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            // 隐藏所有标签页
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 显示选中的标签页
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // 语音合成
        async function synthesize() {
            const text = document.getElementById('text').value.trim();
            if (!text) {
                showStatus('请输入要合成的文本', 'error');
                return;
            }

            const service = document.getElementById('service').value;
            const voice = document.getElementById('voice').value;
            const speed = parseFloat(document.getElementById('speed').value);
            const pitch = parseFloat(document.getElementById('pitch').value);
            const volume = parseInt(document.getElementById('volume').value);

            if (!voice) {
                showStatus('请选择声音模型', 'error');
                return;
            }

            try {
                showStatus('正在合成语音...', 'info');

                const result = await ttsClient.synthesize(text, {
                    service,
                    voice,
                    speed,
                    pitch,
                    volume
                });

                if (result && result.audioUrl) {
                    currentAudio = result;
                    document.getElementById('synthesizeBtn').disabled = true;
                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('downloadBtn').disabled = false;
                    showStatus('语音合成成功！', 'success');

                    // 自动开始播放
                    playAudio();
                } else {
                    showStatus('语音合成失败：未返回音频URL', 'error');
                }
            } catch (error) {
                showStatus(`语音合成失败: ${error.message}`, 'error');
            } finally {
                document.getElementById('synthesizeBtn').disabled = false;
            }
        }

        // 播放音频
        function playAudio() {
            if (!currentAudio || !currentAudio.audioUrl) {
                showStatus('没有可播放的音频', 'error');
                return;
            }

            try {
                // 如果已有播放器，先停止
                if (currentAudioPlayer) {
                    currentAudioPlayer.stop();
                }

                // 创建新的播放器
                currentAudioPlayer = ttsClient.createAudioPlayer(currentAudio.audioUrl);
                const audio = currentAudioPlayer.audio;

                // 设置音频控件
                document.getElementById('audio').src = currentAudio.audioUrl;

                // 显示播放器
                document.getElementById('audioPlayer').style.display = 'block';

                // 绑听播放事件
                currentAudioPlayer.on('play', () => {
                    document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i> 暂停';
                    showStatus('正在播放音频...', 'info');
                });

                currentAudioPlayer.on('pause', () => {
                    document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i> 播放';
                    showStatus('音频已暂停', 'info');
                });

                currentAudioPlayer.on('ended', () => {
                    document.getElementById('playBtn').innerHTML = '<i class="progress-bar"></i> 播放';
                    showStatus('音频播放完成', 'success');
                    clearAudio();
                });

                currentAudioPlayer.on('error', (error) => {
                    showStatus(`播放失败: ${error.message}`, 'error');
                });

                // 更新进度条
                audio.addEventListener('timeupdate', updateProgress);

                // 开始播放
                audio.play();
            } catch (error) {
                showStatus(`播放失败: ${error.message}`, 'error');
            }
        }

        // 暂停/继续播放
        function togglePlay() {
            if (!currentAudioPlayer) return;

            if (currentAudioPlayer.audio.paused) {
                currentAudioPlayer.play();
            } else {
                currentAudioPlayer.pause();
            }
        }

        // 停止播放
        function stopAudio() {
            if (!currentAudioPlayer) return;

            currentAudioPlayer.stop();
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i> 播放';
            showStatus('音频已停止', 'info');
        }

        // 静音控制
        function muteAudio() {
            if (!currentAudioPlayer) return;

            const audio = currentAudioPlayer.audio;
            audio.muted = !audio.muted;

            const muteIcon = document.getElementById('muteIcon');
            if (audio.muted) {
                muteIcon.className = 'fas fa-volume-mute';
            } else {
                muteIcon.className = 'fas fa-volume-up';
            }
        }

        // 更新进度条
        function updateProgress() {
            if (!currentAudioPlayer) return;

            const audio = currentAudioPlayer.audio;
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        // 下载音频
        async function downloadAudio() {
            if (!currentAudio) {
                showStatus('没有可下载的音频', 'error');
                return;
            }

            const text = document.getElementById('text').trim();
            const timestamp = new Date().getTime();
            const filename = `tts_${timestamp}.mp3`;

            try {
                showStatus('正在下载音频...', 'info');
                const success = await ttsClient.downloadAudio(text, filename, {
                    service: document.getElementById('service').value,
                    voice: document.getElementById('voice').value
                });

                if (success) {
                    showStatus(`音频已下载: ${filename}`, 'success');
                } else {
                    showStatus('下载失败', 'error');
                }
            } catch (error) {
                showStatus(`下载失败: ${error.message}`, 'error');
            }
        }

        // 清除音频
        function clearAudio() {
            currentAudio = null;
            currentAudioPlayer = null;
            document.getElementById('audioPlayer').style.display = 'none';
            document.getElementById('audio').src = '';
            document.getElementById('progressFill').style.width = '0%';

            document.getElementById('playBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;

            if (document.getElementById('synthesizeBtn').disabled === false) {
                document.getElementById('clearBtn').innerHTML = '<i class="fas fa-trash"></i> 清除';
            }
        }

        // 筛选模型
        function filterModels() {
            const category = document.getElementById('categoryFilter').value;
            const tag = document.getElementById('tagFilter').value;
            const language = document.getElementById('languageFilter').value;

            let filteredModels = allModels;

            if (category) {
                filteredModels = filteredModels.filter(model => model.category === category);
            }

            if (tag) {
                filteredModels = filteredModels.filter(model => model.tags && model.tags.includes(tag));
            }

            if (language) {
                filteredModels = filteredModels.filter(model => model.languages && model.languages.includes(language));
            }

            displayModels(filteredModels);
        }

        // 搜索模型
        async function searchModels() {
            const query = document.getElementById('searchText').value.trim();
            if (!query) {
                displayModels(allModels);
                return;
            }

            try {
                showStatus('正在搜索...', 'info');
                const results = await ttsClient.searchModels(query);
                const container = document.getElementById('searchResults');

                if (results.length > 0) {
                    displayModels(results);
                    showStatus(`找到 ${results.length} 个匹配的模型`, 'success');
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #666;">没有找到匹配的模型</p>';
                    showStatus('没有找到匹配的模型', 'info');
                }
            } catch (error) {
                showStatus(`搜索失败: ${error.message}`, 'error');
            }
        }

        // 清除搜索
        function clearSearch() {
            document.getElementById('searchText').value = '';
            document.getElementById('searchResults').innerHTML = '';
            displayModels(allModels);
        }

        // 更新统计信息
        function updateStats() {
            if (allModels.length === 0) return;

            const totalModels = allModels.length;
            const femaleModels = allModels.filter(m => m.gender === 'female').length;
            const maleModels = allModels.filter(m => m.gender === 'male').length;

            document.getElementById('totalModels').textContent = totalModels;
            document.getElementById('femaleModels').textContent = femaleModels;
            document.getElementById('maleModels').textContent = maleModels;
        }

        // 检查服务状态
        async function checkServiceStatus() {
            try {
                const isOnline = await ttsClient.checkServiceStatus();
                const statusElement = document.getElementById('status');

                if (isOnline) {
                    statusElement.textContent = '🟢 在线';
                    statusElement.className = 'status success';
                } else {
                    statusElement.textContent = '🔴 离线';
                    statusElement.className = 'status error';
                }
            } catch (error) {
                document.getElementById('status').textContent = '🔴 检查失败';
                document.getElementById('status').className = 'status error';
            }
        }

        // 显示状态消息
        function showStatus(message, type = 'info') {
            const statusElement = document.getElementById('status');
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
            statusElement.style.display = 'block';

            // 3秒后自动隐藏成功消息
            if (type === 'success') {
                setTimeout(() => {
                    statusElement.style.display = 'none';
                }, 3000);
            }
        }

        // 隐藏状态消息
        function hideStatus() {
            const statusElement = document.getElementById('status');
            statusElement.style.display = 'none';
        }
    </script>
</body>
</html>
