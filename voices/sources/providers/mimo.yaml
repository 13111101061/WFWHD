    displayName: MiMo-默认
    name: MiMo-默认
    gender: female
    languages: [zh-CN, en]
    description: "默认音色（集群决定）"
    tags: [通用, 默认, 中性]
    ttsConfig:
      voiceId: mimo_default
      model: mimo-v2.5-tts-realtime

