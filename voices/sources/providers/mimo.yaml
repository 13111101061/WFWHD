# MiMo TTS 音色配置
# 提供商：小米 MiMo (OpenAI-compatible Chat Completions API)
# 服务：mimo_tts (MiMo 语音合成)
# 最后更新：2026-06-03

meta:
  provider: mimo
  service: tts
  version: "1.0"
  description: 小米 MiMo TTS 语音合成 — 9 个预置音色
  enabled: true

voices:
