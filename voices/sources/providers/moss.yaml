    displayName: 阿树
    name: 阿树
    gender: female
    languages: [中文]
    description: 冬天清晨的灰白天空，风很冷，但阳光迟早会出来。
    tags: [松弛, 耐听, 女声]
    ttsConfig:
      sourceId: "2001257729754140672"
      model: moss-tts
      samplingParams:
        temperature: 1.7
        top_p: 0.8
        top_k: 25