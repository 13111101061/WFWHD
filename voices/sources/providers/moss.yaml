    languages: [中文]
    description: 普通话标准，带轻微北京口音，发音清晰自然，语气松弛有亲和力。
    tags: [清晰, 自然, 松弛, 亲和]
    ttsConfig:
      sourceId: "2020008594694475776"
      model: moss-tts
      samplingParams:
