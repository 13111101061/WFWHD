# 腾讯云凭证配置

meta:
  provider: tencent
  name: 腾讯云
  description: 腾讯云语音合成服务
  selector: priority
  circuitBreaker:
    enabled: true
    failureThreshold: 5
    resetTimeout: 60000

requiredFields:
  - secretId
  - secretKey

accounts:
  - id: primary
    name: 主账号
    credentials:
      secretId: ${TENCENTCLOUD_SECRET_ID:-}
      secretKey: ${TENCENTCLOUD_SECRET_KEY:-}
      region: ${TENCENTCLOUD_REGION:-ap-guangzhou}
    services:
      - tts
    priority: 1
    weight: 1
    enabled: true
    metadata:
      description: 腾讯云TTS主账号
      tags: [production, primary]