# MiniMax 凭证配置

meta:
  provider: minimax
  name: MiniMax
  description: MiniMax 语音合成服务
  selector: priority
  circuitBreaker:
    enabled: true
    failureThreshold: 5
    resetTimeout: 60000

requiredFields:
  - apiKey

accounts:
  - id: primary
    name: 主账号
    credentials:
      apiKey: ${MINIMAX_API_KEY:-}
      groupId: ${MINIMAX_GROUP_ID:-}
    services:
      - minimax_tts
    priority: 1
    weight: 1
    enabled: true
    metadata:
      description: MiniMax TTS主账号
      tags: [production, primary]