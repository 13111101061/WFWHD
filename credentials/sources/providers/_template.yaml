# ============================================================
# 新服务商凭证模板
# ============================================================
# 使用方法：
#   1. 复制此文件: cp _template.yaml <providerKey>.yaml
#   2. 替换所有 <占位符> 为实际值
#   3. 确保 providerKey 与 manifest.json 中的 providerKey 一致
#
# 凭证模式 (credentialMode) 对应关系：
#   apiKey    → requiredFields: [apiKey]
#   secretKey → requiredFields: [secretId, secretKey]
#   accessKey → requiredFields: [accessKey, secretKey]
# ============================================================

meta:
  provider: <providerKey>
  name: <服务商显示名>
  description: <服务商描述>
  selector: priority
  circuitBreaker:
    enabled: true
    failureThreshold: 5
    resetTimeout: 60000

requiredFields:
  - apiKey

accounts:
  - id: primary
    name: 主账号
    credentials:
      apiKey: <YOUR_API_KEY>
    services:
      - <serviceKey>
    priority: 1
    weight: 1
    enabled: true
    metadata:
      description: 主账号
      tags: [production, primary]
