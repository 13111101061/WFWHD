# 阿里云凭证配置

meta:
  provider: aliyun
  name: 阿里云
  description: 阿里云智能语音服务
  selector: priority
  circuitBreaker:
    enabled: true
    failureThreshold: 5
    resetTimeout: 60000

requiredFields:
  - apiKey

accounts:
  - id: primary
    name: 主账号
    credentials:
      apiKey: ${QWEN_API_KEY:-${TTS_API_KEY:-}}
    services:
      - cosyvoice
      - qwen_http
      - qwen_ws
    priority: 1
    weight: 3
    enabled: true
    metadata:
      description: 生产环境主账号
      tags: [production, primary]