# MOSS-TTS 凭证配置

meta:
  provider: moss
  name: MOSS-TTS
  description: MOSS-TTS 语音合成服务
  selector: priority
  circuitBreaker:
    enabled: true
    failureThreshold: 5
    resetTimeout: 60000

requiredFields:
  - apiKey

accounts:
  - id: primary
    name: 主账号
    credentials:
      apiKey: ${MOSS_API_KEY:-}
    services:
      - tts
    priority: 1
    weight: 1
    enabled: true
    metadata:
      description: MOSS-TTS主账号
      tags: [production, primary]