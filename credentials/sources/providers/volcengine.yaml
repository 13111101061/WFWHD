# 火山引擎凭证配置

meta:
  provider: volcengine
  name: 火山引擎
  description: 火山引擎语音合成服务
  selector: priority
  circuitBreaker:
    enabled: true
    failureThreshold: 5
    resetTimeout: 60000

requiredFields:
  - appId
  - token

accounts:
  - id: primary
    name: 主账号
    credentials:
      appId: ${VOLCENGINE_APP_ID:-}
      token: ${VOLCENGINE_TOKEN:-}
      accessKey: ${VOLCENGINE_ACCESS_KEY:-}
      secretKey: ${VOLCENGINE_SECRET_KEY:-}
    services:
      - volcengine_http
      - volcengine_ws
    priority: 1
    weight: 1
    enabled: true
    metadata:
      description: 火山引擎TTS主账号
      tags: [production, primary]