<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS服务测试页面</title>
    <style>
        :root {
            --primary-color: #409eff;
            --success-color: #67c23a;
            --warning-color: #e6a23c;
            --danger-color: #f56c6c;
            --info-color: #909399;
            --border-color: #dcdfe6;
            --background-color: #f5f7fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif;
            background-color: var(--background-color);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .config-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #66b1ff;
        }

        button:disabled {
            background-color: #a0cfff;
            cursor: not-allowed;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .service-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .service-card h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .result-section {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
        }

        .result-section h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .result-content {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .status {
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .status.success {
            background-color: rgba(103, 194, 58, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .status.error {
            background-color: rgba(245, 108, 108, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .status.loading {
            background-color: rgba(64, 158, 255, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .audio-player {
            margin-top: 15px;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        .api-key-warning {
            background-color: #fdf6ec;
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .concurrent-test-section {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
        }

        .concurrent-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .concurrent-controls input {
            width: 80px;
        }

        .concurrent-results {
            margin-top: 20px;
        }

        .progress-bar {
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }

        .concurrent-result-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .concurrent-result-item:last-child {
            border-bottom: none;
        }

        .concurrent-result-item.success {
            background-color: rgba(103, 194, 58, 0.1);
        }

        .concurrent-result-item.error {
            background-color: rgba(245, 108, 108, 0.1);
        }

        /* 统计数据模块样式 */
        .stats-section {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-top: 20px;
        }

        .stats-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stats-controls button {
            width: auto;
            min-width: 120px;
            padding: 8px 16px;
        }

        .stats-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stats-card {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
        }

        .stats-card h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 16px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .stats-item:last-child {
            border-bottom: none;
        }

        .stats-value {
            font-weight: bold;
            color: var(--primary-color);
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .stats-table th,
        .stats-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .stats-table th {
            background-color: var(--background-color);
            font-weight: bold;
            color: var(--primary-color);
        }

        .stats-loading {
            text-align: center;
            padding: 20px;
            color: var(--info-color);
        }

        .stats-error {
            text-align: center;
            padding: 20px;
            color: var(--danger-color);
            background-color: rgba(245, 108, 108, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TTS服务测试页面</h1>
            <p>用于测试后端TTS服务和声音模型管理系统</p>
        </header>

        <!-- 配置区域 -->
        <section class="config-section">
            <h2>全局配置</h2>
            <div class="form-group">
                <label for="apiBaseUrl">API基础URL:</label>
                <input type="text" id="apiBaseUrl" placeholder="例如: http://localhost:3000 或 https://yourdomain.com" 
                       value="http://localhost:3000">
            </div>
            <div class="form-group">
                <label for="apiKey">API密钥 (X-API-Key):</label>
                <input type="password" id="apiKey" placeholder="请输入API密钥" value="key2">
                <div class="api-key-warning">
                    注意：API密钥是必需的，用于访问后端服务
                </div>
            </div>
        </section>

        <!-- 声音模型管理区域 -->
        <section class="config-section">
            <h2>声音模型管理</h2>
            <div class="stats-controls">
                <button onclick="loadAllModels()">加载所有模型</button>
                <button onclick="loadModelsByCategory('female')">女声模型</button>
                <button onclick="loadModelsByCategory('male')">男声模型</button>
                <button onclick="loadModelsByTag('popular')">热门模型</button>
                <button onclick="searchModels()">搜索模型</button>
                <button onclick="getSystemStats()">系统统计</button>
            </div>
            <div class="form-group">
                <label for="searchModelInput">搜索关键词:</label>
                <input type="text" id="searchModelInput" placeholder="输入模型名称或描述关键词">
            </div>
        </section>

        <!-- 服务测试区域 -->
        <div class="service-grid">
            <!-- 统一端点测试 -->
            <div class="service-card">
                <h2>统一端点测试</h2>
                <div class="form-group">
                    <label for="unifiedText">文本内容:</label>
                    <textarea id="unifiedText">你好，这是统一端点TTS服务测试。</textarea>
                </div>
                <div class="form-group">
                    <label for="unifiedService">TTS服务:</label>
                    <select id="unifiedService">
                        <option value="aliyun_qwen_http">阿里云千问HTTP</option>
                        <option value="aliyun_qwen_ws">阿里云千问WebSocket</option>
                        <option value="aliyun_cosyvoice">阿里云CosyVoice</option>
                        <option value="tencent">腾讯云TTS</option>
                        <option value="volcengine_http">火山引擎HTTP</option>
                        <option value="volcengine_ws">火山引擎WebSocket</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="unifiedVoice">音色:</label>
                    <select id="unifiedVoice">
                        <option value="">选择音色</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="unifiedSpeed">语速 (0.5-2.0):</label>
                    <input type="number" id="unifiedSpeed" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <button id="unifiedTestBtn" onclick="testUnifiedTts()">测试统一端点</button>
                <div id="unifiedStatus" class="status hidden"></div>
            </div>

            <!-- 阿里云千问TTS -->
            <div class="service-card">
                <h2>阿里云千问TTS</h2>
                <div class="form-group">
                    <label for="qwenText">文本内容:</label>
                    <textarea id="qwenText">你好，这是阿里云千问TTS服务测试。</textarea>
                </div>
                <div class="form-group">
                    <label for="qwenVoice">音色:</label>
                    <select id="qwenVoice">
                        <option value="Cherry">Cherry (甜美女声)</option>
                        <option value="Serena">Serena (温柔女声)</option>
                        <option value="Ethan">Ethan (自然男声)</option>
                        <option value="Chelsie">Chelsie (优雅女声)</option>
                        <option value="Catherine">Catherine (英伦女声)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="qwenSpeed">语速 (0.5-2.0):</label>
                    <input type="number" id="qwenSpeed" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <div class="form-group">
                    <label for="qwenPitch">音调 (0.5-2.0):</label>
                    <input type="number" id="qwenPitch" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <button id="qwenTestBtn" onclick="testQwenTts()">测试千问TTS</button>
                <div id="qwenStatus" class="status hidden"></div>
            </div>

            <!-- 腾讯云TTS -->
            <div class="service-card">
                <h2>腾讯云TTS</h2>
                <div class="form-group">
                    <label for="tencentText">文本内容:</label>
                    <textarea id="tencentText">你好，这是腾讯云TTS服务测试。</textarea>
                </div>
                <div class="form-group">
                    <label for="tencentVoice">音色:</label>
                    <select id="tencentVoice">
                        <option value="101016">101016 (甜美女声)</option>
                        <option value="101001">101001 (自然女声)</option>
                        <option value="101005">101005 (活力男声)</option>
                        <option value="101007">101007 (客服女声)</option>
                        <option value="101008">101008 (客服男声)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tencentSpeed">语速 (-2.0-2.0):</label>
                    <input type="number" id="tencentSpeed" min="-2.0" max="2.0" step="0.1" value="0">
                </div>
                <div class="form-group">
                    <label for="tencentVolume">音量 (0-10):</label>
                    <input type="number" id="tencentVolume" min="0" max="10" step="1" value="0">
                </div>
                <button id="tencentTestBtn" onclick="testTencentTts()">测试腾讯云TTS</button>
                <div id="tencentStatus" class="status hidden"></div>
            </div>

            <!-- 火山云TTS -->
            <div class="service-card">
                <h2>火山云TTS</h2>
                <div class="form-group">
                    <label for="volcengineText">文本内容:</label>
                    <textarea id="volcengineText">你好，这是火山云TTS服务测试。</textarea>
                </div>
                <div class="form-group">
                    <label for="volcengineVoice">音色:</label>
                    <select id="volcengineVoice">
                        <option value="BV001_streaming">BV001_streaming (甜美萌妹)</option>
                        <option value="BV002_streaming">BV002_streaming (温柔女声)</option>
                        <option value="BV003_streaming">BV003_streaming (优雅女声)</option>
                        <option value="BV004_streaming">BV004_streaming (甜美女声)</option>
                        <option value="BV032_streaming">BV032_streaming (甜美女声)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="volcengineSpeed">语速 (0.5-2.0):</label>
                    <input type="number" id="volcengineSpeed" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <div class="form-group">
                    <label for="volcengineVolume">音量 (0-100):</label>
                    <input type="number" id="volcengineVolume" min="0" max="100" step="1" value="10">
                </div>
                <button id="volcengineTestBtn" onclick="testVolcengineTts()">测试火山云TTS</button>
                <div id="volcengineStatus" class="status hidden"></div>
            </div>
        </div>

        <!-- 统计数据查询区域 -->
        <section class="stats-section">
            <h2>API调用统计</h2>
            <div class="stats-controls">
                <button onclick="getOverallStats()">总体统计</button>
                <button onclick="getDailyStats()">每日统计</button>
                <button onclick="getPopularEndpoints()">热门端点</button>
                <button onclick="getStatsSummary()">统计摘要</button>
                <button onclick="clearOldStats()" style="background-color: var(--warning-color);">清理旧数据</button>
                <button onclick="resetStats()" style="background-color: var(--danger-color);">重置统计</button>
            </div>
            
            <div id="statsDisplay" class="stats-display">
                <div class="stats-loading">点击上方按钮查看统计数据</div>
            </div>
        </section>

        <!-- 并发测试区域 -->
        <section class="concurrent-test-section">
            <h2>并发测试</h2>
            <div class="concurrent-controls">
                <div class="form-group">
                    <label for="concurrentCount">并发请求数:</label>
                    <input type="number" id="concurrentCount" min="1" max="10" value="3">
                </div>
                <div class="form-group">
                    <label for="concurrentText">测试文本:</label>
                    <input type="text" id="concurrentText" value="这是并发测试文本">
                </div>
                <button id="startConcurrentTestBtn" onclick="startConcurrentTest()">开始并发测试</button>
                <button id="stopConcurrentTestBtn" onclick="stopConcurrentTest()" disabled>停止测试</button>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            
            <div id="concurrentResults" class="concurrent-results"></div>
        </section>

        <!-- 结果显示区域 -->
        <section class="result-section">
            <h2>测试结果</h2>
            <div id="resultContent" class="result-content">等待测试结果...</div>
            <audio id="audioPlayer" class="audio-player" controls hidden></audio>
        </section>
    </div>

    <script>
        // 测试控制变量
        let isTesting = false;
        let abortController = null;

        // 更新结果区域
        function updateResult(content, isJson = false) {
            const resultElement = document.getElementById('resultContent');
            if (isJson) {
                resultElement.textContent = JSON.stringify(content, null, 2);
            } else {
                resultElement.textContent = content;
            }
        }

        // 显示状态信息
        function showStatus(elementId, message, type) {
            const statusElement = document.getElementById(elementId);
            statusElement.textContent = message;
            statusElement.className = 'status ' + type;
            statusElement.classList.remove('hidden');
        }

        // 隐藏状态信息
        function hideStatus(elementId) {
            const statusElement = document.getElementById(elementId);
            statusElement.classList.add('hidden');
        }

        // 获取配置信息
        function getConfig() {
            const apiBaseUrl = document.getElementById('apiBaseUrl').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            
            if (!apiBaseUrl) {
                alert('请填写API基础URL');
                return null;
            }
            
            if (!apiKey) {
                alert('请填写API密钥');
                return null;
            }
            
            return { apiBaseUrl, apiKey };
        }

        // 测试阿里云千问TTS
        async function testQwenTts() {
            const config = getConfig();
            if (!config) return;
            
            const testBtn = document.getElementById('qwenTestBtn');
            testBtn.disabled = true;
            showStatus('qwenStatus', '正在测试...', 'loading');
            
            try {
                const text = document.getElementById('qwenText').value;
                const voice = document.getElementById('qwenVoice').value;
                const speed = parseFloat(document.getElementById('qwenSpeed').value);
                const pitch = parseFloat(document.getElementById('qwenPitch').value);
                
                const response = await fetch(`${config.apiBaseUrl}/api/qwen-tts-http`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': config.apiKey
                    },
                    body: JSON.stringify({
                        text: text,
                        voice: voice,
                        speed: speed,
                        pitch: pitch
                    })
                });
                
                const data = await response.json();
                updateResult(data, true);
                
                if (data.success) {
                    showStatus('qwenStatus', '测试成功!', 'success');
                    playAudio(data.data.audioUrl, config.apiBaseUrl);
                } else {
                    showStatus('qwenStatus', '测试失败: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('测试千问TTS时出错:', error);
                updateResult('测试千问TTS时出错: ' + error.message);
                showStatus('qwenStatus', '测试出错: ' + error.message, 'error');
            } finally {
                testBtn.disabled = false;
            }
        }

        // 测试腾讯云TTS
        async function testTencentTts() {
            const config = getConfig();
            if (!config) return;
            
            const testBtn = document.getElementById('tencentTestBtn');
            testBtn.disabled = true;
            showStatus('tencentStatus', '正在测试...', 'loading');
            
            try {
                const text = document.getElementById('tencentText').value;
                const voice = parseInt(document.getElementById('tencentVoice').value);
                const speed = parseFloat(document.getElementById('tencentSpeed').value);
                const volume = parseInt(document.getElementById('tencentVolume').value);
                
                const response = await fetch(`${config.apiBaseUrl}/api/tencent-tts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': config.apiKey
                    },
                    body: JSON.stringify({
                        text: text,
                        voiceType: voice,
                        speed: speed,
                        volume: volume
                    })
                });
                
                const data = await response.json();
                updateResult(data, true);
                
                if (data.success) {
                    showStatus('tencentStatus', '测试成功!', 'success');
                    playAudio(data.data.audioUrl, config.apiBaseUrl);
                } else {
                    showStatus('tencentStatus', '测试失败: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('测试腾讯云TTS时出错:', error);
                updateResult('测试腾讯云TTS时出错: ' + error.message);
                showStatus('tencentStatus', '测试出错: ' + error.message, 'error');
            } finally {
                testBtn.disabled = false;
            }
        }

        // 测试火山云TTS
        async function testVolcengineTts() {
            const config = getConfig();
            if (!config) return;
            
            const testBtn = document.getElementById('volcengineTestBtn');
            testBtn.disabled = true;
            showStatus('volcengineStatus', '正在测试...', 'loading');
            
            try {
                const text = document.getElementById('volcengineText').value;
                const voice = document.getElementById('volcengineVoice').value;
                const speed = parseFloat(document.getElementById('volcengineSpeed').value);
                const volume = parseInt(document.getElementById('volcengineVolume').value);
                
                const response = await fetch(`${config.apiBaseUrl}/api/volcengine-tts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': config.apiKey
                    },
                    body: JSON.stringify({
                        text: text,
                        voice_type: voice,
                        speed: speed,
                        volume: volume
                    })
                });
                
                const data = await response.json();
                updateResult(data, true);
                
                if (data.success) {
                    showStatus('volcengineStatus', '测试成功!', 'success');
                    playAudio(data.data.audioUrl, config.apiBaseUrl);
                } else {
                    showStatus('volcengineStatus', '测试失败: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('测试火山云TTS时出错:', error);
                updateResult('测试火山云TTS时出错: ' + error.message);
                showStatus('volcengineStatus', '测试出错: ' + error.message, 'error');
            } finally {
                testBtn.disabled = false;
            }
        }

        // 播放音频
        function playAudio(audioUrl, apiBaseUrl) {
            if (!audioUrl) return;
            
            const audioPlayer = document.getElementById('audioPlayer');

        // 并发测试相关函数
        async function startConcurrentTest() {
            if (isTesting) return;
            
            const config = getConfig();
            if (!config) return;
            
            const concurrentCount = parseInt(document.getElementById('concurrentCount').value);
            const concurrentText = document.getElementById('concurrentText').value;
            
            if (concurrentCount < 1 || concurrentCount > 10) {
                alert('并发请求数必须在1-10之间');
                return;
            }
            
            if (!concurrentText.trim()) {
                alert('请输入测试文本');
                return;
            }
            
            isTesting = true;
            abortController = new AbortController();
            
            document.getElementById('startConcurrentTestBtn').disabled = true;
            document.getElementById('stopConcurrentTestBtn').disabled = false;
            document.getElementById('concurrentResults').innerHTML = '';
            document.getElementById('progressFill').style.width = '0%';
            
            // 创建测试任务
            const services = [
                { name: '阿里云千问', service: 'aliyun_qwen_http', voice: 'Cherry' },
                { name: '腾讯云', service: 'tencent', voiceType: 101016 },
                { name: '火山云', service: 'volcengine_http', voice_type: 'BV001_streaming' }
            ];
            
            const tasks = [];
            for (let i = 0; i < concurrentCount; i++) {
                // 循环使用不同的服务
                const service = services[i % services.length];
                tasks.push({
                    id: i + 1,
                    service: service.service,
                    serviceName: service.name,
                    text: `${concurrentText} (${i + 1})`,
                    ...service
                });
            }
            
            // 执行并发测试
            await runConcurrentTests(tasks, config);
        }

        async function runConcurrentTests(tasks, config) {
            const resultsContainer = document.getElementById('concurrentResults');
            const progressFill = document.getElementById('progressFill');
            let completed = 0;
            const total = tasks.length;
            
            // 创建结果项
            tasks.forEach(task => {
                const resultItem = document.createElement('div');
                resultItem.id = `result-${task.id}`;
                resultItem.className = 'concurrent-result-item';
                resultItem.innerHTML = `
                    <strong>任务 ${task.id} (${task.serviceName})</strong>: 
                    <span>处理中...</span>
                `;
                resultsContainer.appendChild(resultItem);
            });
            
            // 并发执行所有任务
            const promises = tasks.map(async (task) => {
                try {
                    // 检查是否已取消
                    if (abortController.signal.aborted) {
                        throw new Error('测试已取消');
                    }
                    
                    // 构造请求参数
                    const requestBody = {
                        service: task.service,
                        text: task.text
                    };
                    
                    if (task.voice) requestBody.voice = task.voice;
                    if (task.voiceType) requestBody.voiceType = task.voiceType;
                    if (task.voice_type) requestBody.voice_type = task.voice_type;
                    
                    const response = await fetch(`${config.apiBaseUrl}/api/unified-tts`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': config.apiKey
                        },
                        body: JSON.stringify(requestBody),
                        signal: abortController.signal
                    });
                    
                    const data = await response.json();
                    
                    // 更新结果
                    const resultItem = document.getElementById(`result-${task.id}`);
                    if (resultItem) {
                        resultItem.className = 'concurrent-result-item success';
                        resultItem.innerHTML = `
                            <strong>任务 ${task.id} (${task.serviceName})</strong>: 
                            <span>成功 - ${(data.data && data.data.duration) ? `时长: ${data.data.duration.toFixed(2)}秒` : '无时长信息'}</span>
                        `;
                    }
                } catch (error) {
                    // 更新结果
                    const resultItem = document.getElementById(`result-${task.id}`);
                    if (resultItem) {
                        resultItem.className = 'concurrent-result-item error';
                        resultItem.innerHTML = `
                            <strong>任务 ${task.id} (${task.serviceName})</strong>: 
                            <span>失败 - ${error.message}</span>
                        `;
                    }
                } finally {
                    completed++;
                    // 更新进度条
                    progressFill.style.width = `${(completed / total) * 100}%`;
                }
            });
            
            try {
                await Promise.all(promises);
            } catch (error) {
                console.error('并发测试出错:', error);
            } finally {
                isTesting = false;
                document.getElementById('startConcurrentTestBtn').disabled = false;
                document.getElementById('stopConcurrentTestBtn').disabled = true;
            }
        }

        function stopConcurrentTest() {
            if (isTesting && abortController) {
                abortController.abort();
            }
        }

        // 统一端点测试函数
        async function testUnifiedTts() {
            const text = document.getElementById('unifiedText').value;
            const service = document.getElementById('unifiedService').value;
            const voice = document.getElementById('unifiedVoice').value;
            const speed = parseFloat(document.getElementById('unifiedSpeed').value);
            const statusDiv = document.getElementById('unifiedStatus');
            const testBtn = document.getElementById('unifiedTestBtn');

            if (!text.trim()) {
                alert('请输入要转换的文本');
                return;
            }

            testBtn.disabled = true;
            statusDiv.className = 'status';
            statusDiv.textContent = '正在测试统一端点...';

            try {
                // 构造请求参数
                const requestBody = {
                    service: service,
                    text: text,
                    speed: speed
                };

                // 根据服务类型添加音色参数
                if (voice) {
                    if (service.includes('qwen')) {
                        requestBody.voice = voice;
                    } else if (service === 'tencent') {
                        requestBody.voiceType = voice;
                    } else if (service.includes('volcengine')) {
                        requestBody.voice_type = voice;
                    }
                }

                const response = await fetch(`${config.apiBaseUrl}/api/unified-tts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': config.apiKey
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        <div>✅ 统一端点测试成功!</div>
                        <div>服务: ${service}</div>
                        <div>文件大小: ${data.data.size} 字节</div>
                        <div>时长: ${data.data.duration ? data.data.duration.toFixed(2) + '秒' : '未知'}</div>
                        <audio controls>
                            <source src="data:audio/wav;base64,${data.data.audio}" type="audio/wav">
                            您的浏览器不支持音频播放。
                        </audio>
                    `;
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ 统一端点测试失败: ${data.message || '未知错误'}`;
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ 统一端点测试出错: ${error.message}`;
            } finally {
                testBtn.disabled = false;
            }
        }
